version: '3.8'

services:
  # ── PostgreSQL Database ──────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: mugogo_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       mugogo_erp
      POSTGRES_USER:     mugogo_user
      POSTGRES_PASSWORD: mugogo_pass_2025
    ports:
      - "5432:5432"
    volumes:
      - mugogo_db_data:/var/lib/postgresql/data
      - ./database/migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./database/seeds/002_seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mugogo_user -d mugogo_erp"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mugogo_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV:        production
      PORT:            5000
      DB_HOST:         postgres
      DB_PORT:         5432
      DB_NAME:         mugogo_erp
      DB_USER:         mugogo_user
      DB_PASSWORD:     mugogo_pass_2025
      JWT_SECRET:      mugogo_jwt_secret_change_in_production
      FRONTEND_URL:    http://localhost:3000
    ports:
      - "5000:5000"
    volumes:
      - mugogo_uploads:/app/uploads

  # ── Frontend ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mugogo_web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  mugogo_db_data:
  mugogo_uploads:

networks:
  default:
    name: mugogo_network
